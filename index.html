<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="파워빌딩 PPL 주 6회 트레이닝 일지 — 날짜별 기록·메모·e1RM 추세, Supabase 동기화">
<meta name="theme-color" content="#121418">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PPL 일지">
<title>파워빌딩 PPL · 일지</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23121418'/%3E%3Ctext x='50' y='52' font-size='62' text-anchor='middle' dominant-baseline='central'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121418; --panel:#1A1D24; --panel2:#21252E; --line:#2C313B;
    --text:#E7E9ED; --muted:#9AA0AB; --faint:#7E8694;
    --push:#F2994A; --pull:#3FBFD4; --legs:#B084E8; --flag:#E8C25A; --rom:#5FD3A8;
    --accent:var(--push); --bad:#E07A7A;
    --mono:'Space Mono',monospace; --sans:'Archivo',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.5;padding:0 0 56px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
  .wrap{max-width:780px;margin:0 auto;padding:18px 16px 0}
  [hidden]{display:none !important}

  /* ===== gate (config / auth) ===== */
  .gate{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
  .gcard{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px 20px}
  .gcard h1{font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:0 0 4px}
  .gcard .big{font-size:21px;font-weight:900;margin:0 0 4px;letter-spacing:-.01em}
  .gcard .big em{font-style:normal;color:var(--accent)}
  .gcard p.h{color:var(--muted);font-size:12.5px;margin:0 0 16px}
  .field{display:block;margin:0 0 11px}
  .field span{display:block;font-size:11px;color:var(--muted);font-weight:700;margin:0 0 5px;letter-spacing:.02em}
  .field input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:11px 12px;font-family:var(--sans);font-size:14px}
  .field input:focus{outline:none;border-color:var(--accent)}
  .gbtn{width:100%;background:var(--accent);color:#15171c;border:0;border-radius:10px;padding:12px;font-family:var(--sans);font-weight:800;font-size:14px;cursor:pointer;margin-top:4px}
  .gbtn.alt{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .grow{display:flex;gap:8px;margin-top:4px}
  .grow .gbtn{margin-top:0}
  .gmsg{font-size:12.5px;margin:10px 0 0;min-height:16px}
  .gmsg.err{color:var(--bad)} .gmsg.ok{color:var(--rom)}
  .ghint{font-size:11.5px;color:var(--faint);margin:14px 0 0;line-height:1.6;border-top:1px dashed var(--line);padding-top:12px}
  .ghint b{color:var(--muted)}
  .glink{color:var(--accent);cursor:pointer;text-decoration:underline;background:none;border:0;font:inherit;padding:0}

  header h1{font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 4px}
  header .lede{font-size:23px;font-weight:900;margin:0;letter-spacing:-.01em}
  header .lede em{font-style:normal;color:var(--accent)}
  header .sub{color:var(--muted);font-size:12.5px;margin:6px 0 0}
  .whoami{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);margin-top:8px;flex-wrap:wrap}
  .whoami b{color:var(--text)}
  .whoami .out{margin-left:auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:4px 10px;font-weight:700;font-size:11px;cursor:pointer}
  .sync{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
  .sync.off{color:var(--flag)}

  .bar{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0 4px}
  .seg{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel)}
  .seg .lbl{font-size:10.5px;color:var(--faint);font-weight:700;letter-spacing:.06em;padding:0 10px;text-transform:uppercase}
  .seg button{background:none;border:0;color:var(--muted);font-family:var(--sans);font-weight:700;font-size:12.5px;padding:8px 13px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#15171c}

  /* date bar */
  .datebar{display:flex;align-items:center;gap:8px;margin:14px 0 2px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:7px 9px}
  .datebar button{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;width:34px;height:34px;font-size:16px;font-weight:800;cursor:pointer;line-height:1;flex:none}
  .datebar .di{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:1px}
  .datebar input[type=date]{background:none;border:0;color:var(--text);font-family:var(--mono);font-size:14px;font-weight:700;text-align:center;width:100%;color-scheme:dark}
  .datebar .dw{font-size:10.5px;color:var(--faint);font-weight:700}
  .datebar .today{flex:none;font-size:11px;font-weight:700;color:var(--accent);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:0 10px;height:34px;cursor:pointer}

  .tabs{display:flex;gap:3px;margin:16px 0 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{background:none;border:0;color:var(--muted);font-family:var(--sans);font-weight:700;font-size:13.5px;padding:10px 11px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--text)} .tab.on{color:var(--text);border-bottom-color:var(--accent)}

  .view{animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

  .dayhead{display:flex;align-items:center;flex-wrap:wrap;gap:8px 10px;margin:2px 0 6px}
  .dayhead .num{font-family:var(--mono);font-size:12px;color:var(--accent)}
  .dayhead h2{font-size:20px;font-weight:900;margin:0}
  .cond{display:inline-flex;align-items:center;gap:5px;margin-left:auto}
  .cond span{font-size:10.5px;color:var(--muted);font-weight:700}
  .cond button{background:var(--panel);border:1px solid var(--line);border-radius:7px;font-size:14px;line-height:1;padding:4px 7px;cursor:pointer}
  .cond button.on{border-color:var(--accent);background:var(--panel2)}
  .meta{font-size:12px;color:var(--muted);margin:0 0 12px;padding:8px 11px;background:var(--panel2);border-radius:8px;border-left:3px solid var(--accent)}
  .meta b{color:var(--text)}

  /* session panel: memo + bodyweight/sleep/deload */
  .spanel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin:0 0 12px}
  .spanel textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px 10px;font-family:var(--sans);font-size:13.5px;resize:vertical;min-height:54px;line-height:1.5}
  .spanel textarea:focus{outline:none;border-color:var(--accent)}
  .spanel .srow{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .spanel .sf{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:700}
  .spanel .sf input{width:62px;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:6px 8px;font-family:var(--mono);font-size:13px;text-align:center}
  .spanel .sf input:focus{outline:none;border-color:var(--accent)}
  .spanel .dl{margin-left:auto}
  .spanel .dl button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:6px 11px;font-weight:700;font-size:11.5px;cursor:pointer}
  .spanel .dl button.on{border-color:var(--flag);color:var(--flag);background:rgba(232,194,90,.1)}

  .ex{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:10px;border-left:3px solid var(--accent)}
  .ex-top{display:flex;gap:12px;align-items:flex-start}
  .ex-num{font-family:var(--mono);font-size:12px;color:var(--faint);padding-top:2px;width:20px;flex:none}
  .ex-main{flex:1;min-width:0}
  .ex-name{font-weight:700;font-size:15.5px;word-break:keep-all}
  .ex-cue{color:var(--muted);font-size:12.5px;margin-top:3px;word-break:keep-all}
  .ex-side{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex:none}
  .ex-rx{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--text);background:var(--panel2);border-radius:7px;padding:5px 9px;white-space:nowrap}
  .tempo{font-family:var(--mono);font-size:10.5px;color:var(--rom);background:rgba(95,211,168,.08);border:1px solid rgba(95,211,168,.25);border-radius:6px;padding:3px 7px;white-space:nowrap;letter-spacing:.02em}
  .yt{font-family:var(--sans);font-size:11.5px;font-weight:700;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:7px;padding:4px 9px;white-space:nowrap}
  .yt:hover{border-color:var(--accent);background:var(--panel2)}

  .badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.03em;padding:2px 7px;border-radius:20px;vertical-align:middle;margin-left:6px;background:rgba(232,194,90,.13);color:var(--flag);border:1px solid rgba(232,194,90,.3);word-break:keep-all;white-space:nowrap}
  .flagnote{margin-top:8px;padding:8px 10px;border-radius:8px;font-size:12.5px;background:rgba(232,194,90,.07);border-left:2px solid var(--flag);color:#D8C896}
  .romnote{margin-top:8px;padding:8px 10px;border-radius:8px;font-size:12.5px;background:rgba(95,211,168,.08);border-left:2px solid var(--rom);color:#A7E5CD}
  .romnote b{color:var(--rom)}
  .badge.rom{background:rgba(95,211,168,.13);color:var(--rom);border:1px solid rgba(95,211,168,.3)}

  .log{display:flex;gap:8px;align-items:center;margin-top:12px;padding-top:11px;border-top:1px dashed var(--line);flex-wrap:wrap}
  .log label{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:600}
  .log input{width:58px;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:7px 8px;font-family:var(--mono);font-size:13px;text-align:center}
  .log input.note{width:130px;text-align:left;font-family:var(--sans);font-size:12px}
  .log input:focus{outline:none;border-color:var(--accent)}
  .e1rm{margin-left:auto;font-size:11.5px;color:var(--muted);font-family:var(--mono);background:var(--panel2);border-radius:7px;padding:6px 10px;white-space:nowrap}
  .e1rm b{color:var(--rom);font-size:13.5px}
  .e1rm .best{color:var(--faint)}

  .cardio{margin-top:14px;padding:12px 14px;border-radius:10px;background:var(--panel2);font-size:13px;color:var(--muted)}
  .cardio b{color:var(--text)}

  .warm{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--rom);border-radius:12px;padding:13px 15px;margin:0 0 14px}
  .warm-h{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .warm-sub{font-weight:400;font-size:11px;color:var(--faint)}
  .wu-note{font-size:12px;color:#A7E5CD;margin:8px 0 4px}
  .wu-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px dashed var(--line)}
  .wu-main{flex:1;min-width:0}
  .wu-n{font-weight:700;font-size:13.5px;word-break:keep-all}
  .wu-c{font-size:12px;color:var(--muted);margin-top:1px;word-break:keep-all}
  .wu-ramp{font-size:11.5px;color:var(--faint);margin-top:9px;padding-top:8px;border-top:1px dashed var(--line)}

  .p{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:11px}
  .p h3{margin:0 0 7px;font-size:15px;font-weight:800}
  .p p{margin:0;color:var(--muted);font-size:13.5px}
  .p p+p{margin-top:7px}
  .p .k{color:var(--text);font-weight:600}
  .pill{display:inline-block;font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:6px;background:var(--panel2);color:var(--accent);margin-right:6px}
  .src{font-size:11.5px;color:var(--faint);margin-top:10px;line-height:1.6}
  .cut{color:#D98A8A}

  /* history */
  .hsess{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:9px;cursor:pointer}
  .hsess:hover{border-color:var(--faint)}
  .hh{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .hh .hd{font-family:var(--mono);font-size:13px;font-weight:700}
  .hh .ht{font-weight:800;font-size:13.5px}
  .hh .hw{font-family:var(--mono);font-size:10.5px;color:var(--faint);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .hh .hc{margin-left:auto;font-size:14px}
  .hmemo{font-size:12.5px;color:var(--muted);margin-top:6px;word-break:keep-all;white-space:pre-wrap}
  .hempty{color:var(--faint);font-size:13px;text-align:center;padding:30px 0}

  .save{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:8px 16px;border-radius:30px;font-size:12.5px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:60}
  .save.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .save.err{border-color:var(--bad);color:var(--bad)} .save.off{border-color:var(--flag);color:var(--flag)}

  .fab{position:fixed;right:16px;bottom:18px;width:56px;height:56px;border-radius:50%;background:var(--rom);color:#10231C;border:none;font-size:22px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.4);z-index:50;display:flex;align-items:center;justify-content:center}
  .fab:active{transform:scale(.94)}
  .fpanel{position:fixed;right:16px;bottom:84px;width:280px;max-width:calc(100vw - 32px);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.5);transform:translateY(12px) scale(.98);opacity:0;pointer-events:none;transition:.18s}
  .fpanel.open{transform:none;opacity:1;pointer-events:auto}
  .fp-h{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:8px}
  .fp-time{font-family:var(--mono);font-size:42px;font-weight:700;text-align:center;letter-spacing:.02em;margin:2px 0 8px}
  .fp-time.done{color:var(--rom)}
  .fp-row{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
  .fp-row button{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 10px;font-family:var(--sans);font-size:12.5px;font-weight:700;cursor:pointer;min-width:40px}
  .fp-row button.go{background:var(--rom);color:#10231C;border-color:var(--rom)}
  .fp-row button.pre{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .fp-div{height:1px;background:var(--line);margin:12px 0}
  .fp-set{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .fp-set .lab{font-size:12.5px;color:var(--muted);font-weight:700}
  .fp-set .ctr{display:flex;align-items:center;gap:12px}
  .fp-set .ctr button{width:38px;height:38px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--text);font-size:20px;font-weight:800;cursor:pointer;line-height:1}
  .fp-set .ctr .n{font-family:var(--mono);font-size:24px;font-weight:700;min-width:28px;text-align:center}

  @media(max-width:520px){
    header .lede{font-size:20px}
    .ex-top{flex-wrap:wrap}
    .ex-main{flex:1 1 calc(100% - 32px);min-width:0}
    .ex-side{order:3;flex:0 0 100%;flex-direction:row;align-items:center;justify-content:flex-start;gap:8px;margin-top:6px;flex-wrap:wrap}
    .cond{margin-left:0;width:100%}
    .log input.note{width:100%}
  }
</style>
</head>
<body>

<!-- ===== gate: 설정 / 로그인 ===== -->
<div class="gate" id="gate">
  <div class="gcard" id="gcard"></div>
</div>

<!-- ===== app ===== -->
<div class="wrap" id="app" hidden>
  <header>
    <h1>Powerbuilding · Push Pull Legs</h1>
    <p class="lede">주 6회 <em>일지</em> · 날짜별 기록</p>
    <p class="sub">부위당 주 2회 · 주간 블록(스트렝스/하이퍼트로피) · 프리웨이트 중심 · 유산소 포함 60분 내외</p>
    <div class="whoami"><span>기록자 <b id="meEmail">—</b></span><span class="sync" id="syncDot">● 동기화</span><button class="out" id="logout">로그아웃</button></div>
  </header>

  <div class="bar">
    <div class="seg" id="weekSeg"><span class="lbl">이번 주</span>
      <button data-week="S">스트렝스</button><button data-week="H">하이퍼트로피</button></div>
    <div class="seg" id="lvlSeg"><span class="lbl">숙련도</span>
      <button data-lvl="adv">숙련</button><button data-lvl="onb">온보딩</button></div>
  </div>

  <div class="datebar" id="datebar">
    <button id="dPrev" aria-label="이전 날">‹</button>
    <div class="di"><input type="date" id="dInput" aria-label="운동 날짜"><span class="dw" id="dWeekday"></span></div>
    <button id="dNext" aria-label="다음 날">›</button>
    <button class="today" id="dToday">오늘</button>
  </div>

  <nav class="tabs" id="tabs"></nav>
  <main id="main"></main>
</div>

<div class="save" id="save">저장됨</div>

<button class="fab" id="fab" aria-label="휴식 타이머" hidden>⏱</button>
<div class="fpanel" id="fpanel" hidden>
  <div class="fp-h">휴식 타이머</div>
  <div class="fp-time" id="fpTime">1:30</div>
  <div class="fp-row">
    <button class="pre" data-set="60">60s</button>
    <button class="pre" data-set="90">90s</button>
    <button class="pre" data-set="120">120s</button>
    <button class="pre" data-set="180">180s</button>
  </div>
  <div class="fp-row">
    <button data-adj="-15">−15</button>
    <button class="go" id="fpToggle">시작</button>
    <button data-adj="15">+15</button>
    <button id="fpReset">리셋</button>
  </div>
  <div class="fp-div"></div>
  <div class="fp-set">
    <span class="lab">세트 카운트</span>
    <div class="ctr">
      <button id="setMinus">−</button>
      <span class="n" id="setN">0</span>
      <button id="setPlus">+</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   설정: 아래 두 값을 채우면 설정 화면을 건너뜁니다(선택).
   비워두면 첫 실행 시 브라우저에서 직접 입력합니다.
   둘 다 공개해도 안전한 값입니다(보안은 RLS가 담당).

/* ---------- 부트 ---------- */
function boot(){
  const cfg=getCfg();
  if(!cfg || !cfg.url || !cfg.key){ renderConfig(); return; }
  if(typeof supabase==='undefined'){ renderFatal('Supabase 라이브러리를 불러오지 못했습니다. 네트워크 연결을 확인하고 새로고침하세요.'); return; }
  try{ sb=supabase.createClient(cfg.url, cfg.key, {auth:{persistSession:true, autoRefreshToken:true}}); }
  catch(e){ renderFatal('설정값이 올바르지 않습니다: '+esc(e.message)+'. 설정을 다시 입력하세요.'); return; }
  sb.auth.onAuthStateChange((_ev, session)=>{ USER=session?session.user:null; if(USER) showApp(); else renderAuth(); });
  sb.auth.getSession().then(({data})=>{ USER=data.session?data.session.user:null; if(USER) showApp(); else renderAuth(); })
    .catch(()=>renderAuth());
  window.addEventListener('online', ()=>{ online=true; setSync(); drain(); });
  window.addEventListener('offline', ()=>{ online=false; setSync(); });
}

function renderAuth(){
  $('#app').hidden=true; $('#gate').hidden=false; $('#fab').hidden=true; $('#fpanel').hidden=true;
  $('#gcard').innerHTML=`
    <h1>로그인</h1>
    <p class="big">PPL <em>일지</em></p>
    <p class="h">각자 본인 계정으로 로그인하면 본인 기록만 보입니다.</p>
    <label class="field"><span>이메일</span><input id="auEmail" type="email" autocomplete="username" placeholder="you@example.com"></label>
    <label class="field"><span>비밀번호</span><input id="auPw" type="password" autocomplete="current-password" placeholder="6자 이상"></label>
    <div class="grow"><button class="gbtn" id="auLogin">로그인</button><button class="gbtn alt" id="auSignup">회원가입</button></div>
    <div class="gmsg" id="auMsg"></div>`;
  const msg=$('#auMsg');
  const getv=()=>({email:$('#auEmail').value.trim(), password:$('#auPw').value});
  $('#auLogin').addEventListener('click', async ()=>{
    const {email,password}=getv(); if(!email||!password){ msg.className='gmsg err'; msg.textContent='이메일과 비밀번호를 입력하세요.'; return; }
    msg.className='gmsg'; msg.textContent='로그인 중...';
    const {error}=await sb.auth.signInWithPassword({email,password});
    if(error){ msg.className='gmsg err'; msg.textContent=authErr(error.message); }
  });
  $('#auSignup').addEventListener('click', async ()=>{
    const {email,password}=getv(); if(!email||password.length<6){ msg.className='gmsg err'; msg.textContent='이메일과 6자 이상 비밀번호를 입력하세요.'; return; }
    msg.className='gmsg'; msg.textContent='가입 중...';
    const {data,error}=await sb.auth.signUp({email,password});
    if(error){ msg.className='gmsg err'; msg.textContent=authErr(error.message); return; }
    if(data.session){ msg.className='gmsg ok'; msg.textContent='가입 완료!'; }
    else { msg.className='gmsg ok'; msg.textContent='확인 메일을 보냈습니다. 메일의 링크를 누른 뒤 로그인하세요.'; }
  });
}
function authErr(m){
  if(/Invalid login/i.test(m)) return '이메일 또는 비밀번호가 틀렸습니다.';
  if(/already registered/i.test(m)) return '이미 가입된 이메일입니다. 로그인하세요.';
  if(/Email not confirmed/i.test(m)) return '이메일 미확인 상태입니다. 메일 확인 또는 Supabase에서 Confirm email을 끄세요.';
  return m;
}

function showApp(){
  $('#gate').hidden=true; $('#app').hidden=false; $('#fab').hidden=false; $('#fpanel').hidden=false;

}

/* ---------- e1RM (고반복 과대추정 방지: 12회로 캡) ---------- */
function e1rm(w,r){ w=parseFloat(w); r=parseFloat(r); if(!(w>0)||!(r>0)) return null; if(r<=1) return Math.round(w); return Math.round(w*(1+Math.min(r,12)/30)); }

/* ---------- 로컬 캐시 ---------- */
function cacheKey(d,dt){ return 'pb-cache-'+uid()+'-'+d+'-'+dt; }
function writeCache(){ try{ localStorage.setItem(cacheKey(date,dayType), JSON.stringify({store,sessionMeta})); }catch(e){} }
function readCache(d,dt){ try{ return JSON.parse(localStorage.getItem(cacheKey(d,dt))||'null'); }catch(e){ return null; } }

/* ---------- 아웃박스(오프라인 큐) ---------- */
function getOutbox(){ try{ return JSON.parse(localStorage.getItem(OUTBOX)||'[]'); }catch(e){ return []; } }
function setOutbox(q){ localStorage.setItem(OUTBOX, JSON.stringify(q)); }
function enqueue(item){ const q=getOutbox(); q.push(item); setOutbox(q); }
async function drain(){
  if(!sb||!USER) return;
  let q=getOutbox(); if(!q.length) return;
  const rest=[];
  for(const it of q){
    try{
      const id=await ensureSession(it.date,it.dayType,it.week);
      if(it.kind==='entry') await sb.from('ppl_entries').upsert({...it.payload, session_id:id, user_id:USER.id},{onConflict:'session_id,exercise_key'}).throwOnError();
      else await sb.from('ppl_sessions').update(it.patch).eq('id',id).throwOnError();
    }catch(e){ rest.push(it); }
  }
  setOutbox(rest);
  if(rest.length<q.length) toast('saved');
}

/* ---------- 세션 보장 ---------- */
async function ensureSession(d,dt,wk){
  const k=d+'|'+dt; if(sessIds[k]) return sessIds[k];
  const {data,error}=await sb.from('ppl_sessions')
    .upsert({user_id:USER.id, session_date:d, day_type:dt, week_block:wk, level_mode:level},{onConflict:'user_id,session_date,day_type'})
    .select('id').single();
  if(error) throw error;
  sessIds[k]=data.id; return data.id;
}

/* ---------- 날짜별 로드 ---------- */
async function loadDay(){
  store={}; sessionMeta={}; bestMap={};
  const cache=readCache(date,dayType);
  if(cache){ store=cache.store||{}; sessionMeta=cache.sessionMeta||{}; }
  render(); // 캐시 우선 렌더
  if(!sb||!USER){ return; }
  const dd=date, dt=dayType;
  try{
    const {data:s,error:se}=await sb.from('ppl_sessions').select('*')
      .eq('session_date',dd).eq('day_type',dt).maybeSingle();
    if(se) throw se;
    let serverStore={};
    if(s){ sessIds[dd+'|'+dt]=s.id;
      const {data:ents,error:ee}=await sb.from('ppl_entries').select('*').eq('session_id',s.id);
      if(ee) throw ee;
      (ents||[]).forEach(r=>{ serverStore[r.exercise_key]={w:r.weight_kg??'', r:r.reps??'', rir:r.rir??'', note:r.note||'', name:r.exercise_name||''}; });
    }
    // 아웃박스(미전송 편집)를 서버 결과 위에 머지 → 빈값 덮어쓰기 방지
    const pend=getOutbox().filter(it=>it.date===dd&&it.dayType===dt&&it.kind==='entry');
    pend.forEach(it=>{ const p=it.payload; serverStore[p.exercise_key]={w:p.weight_kg??'', r:p.reps??'', rir:p.rir??'', note:p.note||'', name:p.exercise_name||''}; });
    if(dd===date && dt===dayType){
      store=serverStore;
      sessionMeta = s ? {id:s.id, condition:s.condition, memo:s.memo||'', bodyweight_kg:s.bodyweight_kg, sleep_hours:s.sleep_hours, is_deload:!!s.is_deload} : {};
      await loadBest(DAYS[dt].ex.map((_,i)=>dt+'-'+i));
      writeCache(); render();
    }
  }catch(e){ /* 오프라인/오류 → 캐시 유지 */ }
}
async function loadBest(keys){
  try{
    const {data}=await sb.from('ppl_entries').select('exercise_key,weight_kg,reps').eq('user_id',USER.id).in('exercise_key',keys);
    const m={}; (data||[]).forEach(r=>{ const e=e1rm(r.weight_kg,r.reps); if(e&&(!m[r.exercise_key]||e>m[r.exercise_key])) m[r.exercise_key]=e; });
    bestMap=m;
  }catch(e){}
}

/* ---------- 쓰기: 종목 ---------- */
const entryTimers={};
function collectEntry(key){
  const o=store[key]||{};
  return { session_date:date, week_block:week, exercise_key:key,
    weight_kg:numOrNull(o.w), reps:intOrNull(o.r), rir:intOrNull(o.rir),
    note:(o.note||'').slice(0,500)||null, exercise_name:(o.name||'').slice(0,120)||null };
}
function queueEntry(key){ writeCache(); clearTimeout(entryTimers[key]); entryTimers[key]=setTimeout(()=>flushEntry(key),700); }
function flushEntryNow(key){ if(entryTimers[key]){ clearTimeout(entryTimers[key]); delete entryTimers[key]; } flushEntry(key); }
async function flushEntry(key){
  const snap={date, dayType, week, payload:collectEntry(key)};
  if(!online){ enqueue({kind:'entry',...snap}); toast('off'); return; }
  try{
    const id=await ensureSession(snap.date,snap.dayType,snap.week);
    const {error}=await sb.from('ppl_entries').upsert({...snap.payload, session_id:id, user_id:USER.id},{onConflict:'session_id,exercise_key'});
    if(error) throw error;
    toast('saved');
    if(snap.date===date && snap.dayType===dayType){ await loadBest(DAYS[dayType].ex.map((_,i)=>dayType+'-'+i)); refreshBestUI(); }
  }catch(e){ enqueue({kind:'entry',...snap}); toast(/JWT|expired|401|403/i.test(e.message||'')?'err':'off'); }
}

/* ---------- 쓰기: 세션 메타 ---------- */
let metaTimers={};
function queueMeta(patch,key){ Object.assign(sessionMeta,patch); writeCache(); clearTimeout(metaTimers[key]); metaTimers[key]=setTimeout(()=>flushMeta(patch),600); }
async function flushMeta(patch){
  const snap={date,dayType,week,patch};
  if(!online){ enqueue({kind:'session',...snap}); toast('off'); return; }
  try{
    const id=await ensureSession(date,dayType,week);
    const {error}=await sb.from('ppl_sessions').update(patch).eq('id',id);
    if(error) throw error;
    toast('saved');
  }catch(e){ enqueue({kind:'session',...snap}); toast(/JWT|expired|401|403/i.test(e.message||'')?'err':'off'); }
}

/* ---------- 렌더 ---------- */
function rx(ex){ if(level==='onb') return week==='S'?'2 × 6–8':'2 × 12–15'; return week==='S'?ex.s:ex.h; }
function metaLine(){
  if(level==='onb') return '<b>온보딩 모드</b> · 2세트 · 가볍게 · RIR 3~4 (실패 X) · 기분 좋게 끝내기 · 주 3~4회로 시작 · 피곤하면 보조/코어 1개 생략 OK · 익숙해지면 숙련으로 전환';
  return week==='S'
    ? '<b>스트렝스 주</b> · 메인 컴파운드 5×5 · 휴식 3분+ · RIR 1~2 (고립 1~3) · 메인 직후 백오프 1세트(50%, 실패까지)'
    : '<b>하이퍼트로피 주</b> · 8~15회 · 고립 휴식 짧게(1~1.5분) · RIR 0~2 · 정해진 횟수 채우면 다음에 +무게';
}
function setAccent(k){ document.documentElement.style.setProperty('--accent', (DAYS[k]?'var('+DAYS[k].color+')':'var(--push)')); }

function sessionPanel(){

function refreshBestUI(){
  document.querySelectorAll('.e1rm[data-e]').forEach(el=>{

function warmupBlock(k){
  const items=WARMUP[k].map(w=>`<div class="wu-row"><div class="wu-main"><div class="wu-n">${w.n}</div><div class="wu-c">${w.c}</div></div><a class="yt" href="${w.u}" target="_blank" rel="noopener">▶ 영상</a></div>`).join('');

    <div class="wu-note">${WARMUP_NOTE[k]}</div>${items}
    <div class="wu-ramp">→ 마무리: 첫 컴파운드를 가벼운 무게로 1~2 램프업 세트 후 본 세트 진입.</div></div>`;

function renderDay(k){
  const d=DAYS[k], cur=sessionMeta.condition||0;
  const emos=[['😣',1],['😐',2],['😀',3]].map(([e,v])=>`<button data-c="${v}" class="${cur===v?'on':''}">${e}</button>`).join('');

  return h;
}

  <div class="p"><h3>회사 근처 짐</h3><p>퇴근 후 집으로 가면 정체·안락함의 유혹이 가장 커. 회사 근처 짐으로 직행해 의지력 낭비를 차단.</p></div>
  <div class="p"><h3>시스템 복원력</h3><p>회식·야근으로 하루 빠져도 자책하지 말고 <span class="k">다음 세션에 즉시 복귀.</span> 시스템은 한 번 이탈로 무너지지 않아 — 즉시 복귀할 때만 유지돼.</p></div>
  <div class="p"><h3>기분 좋게 끝내기 (특히 와이프)</h3><p>초보를 기어 나가게 만들면 재방문 확률이 떨어져. 에너지가 남은 좋은 지점에서 멈추는 게 장기 습관엔 더 강력해.</p></div>
  <div class="p"><h3>수면 · 디로드</h3><p>수면 <span class="pill">7~9시간</span>이 회복의 토대. <span class="k">4~6주마다 디로드 주</span>(무게·세트 ~40% 감량)로 피로를 비워. 디로드 주는 세션 상단 <span class="k">디로드 주</span> 버튼으로 표시 — 추세에서 제외돼.</p></div>
  <div class="p"><h3>일지로 패턴 보기</h3><p>매 세션 <span class="k">컨디션·체중·수면·메모</span>를 남기면, 슬럼프 때 <span class="k">기록</span> 탭에서 본인 패턴(무엇이 좋은 세션을 만들었나)을 되짚을 수 있어.</p></div>`;}
function renderEvidence(){return `
  <div class="dayhead"><span class="num">EVIDENCE</span><h2>근거 & 구성 출처</h2></div>
  <div class="p"><h3>이 루틴은 세 소스를 합쳤어</h3>
    <p><span class="k">뼈대(PPL 6일·부위 2회·RIR·교정 종목)</span> = 기존 설계. <span class="k">주간 스트렝스/하이퍼트로피 블록·5×5·백오프·데드 큐·컨디션 로깅·행동 설계</span> = 파워빌딩 문서. <span class="k">와이프 입문 모드·기분 좋게 끝내기·수면</span> = 초보 온보딩 문서.</p></div>
  <div class="p"><h3>빈도: 부위당 주 2회</h3><p>볼륨 동일 시 주 2회 > 1회 근비대(Schoenfeld 메타분석). 6일 PPL이 이를 보장 — 파워빌딩 문서의 주 1회 약점을 보완.</p></div>
  <div class="p"><h3>주기화</h3><p>선형 vs 비선형은 근비대 사실상 동일(Grgic 2017 메타 d≈−0.02), 근력은 비선형이 약간 우세 가능(Caldas). 주기화는 순응도·진행·정체 회피에 유효.</p></div>
  <div class="p"><h3>실패 근접도</h3><p>실패에 가까울수록 비대↑이나 0 RIR 불필요·비선형(Robinson 2024). 1~3 RIR로 멈춰도 비대 동일·피로↓(Refalo 2024).</p></div>
  <div class="p"><h3>파워빌딩 문서에서 의도적으로 뺀 것</h3>
    <p><span class="cut">· 비하인드 넥 프레스</span> — 어깨 충돌·전방 불안정 위험<br>
    <span class="cut">· 단일 세션 어깨 20세트</span> — 정크 볼륨(부위당 세션 ~10세트 초과는 비효율)<br>
    <span class="cut">· 고중량 2분 휴식 고정</span> — 최대근력엔 3분+ 필요<br>
    <span class="cut">· 부위당 주 1회</span> — PPL 2회로 대체<br>
    <span class="cut">· "근육 완전 파괴" 프레임</span> — 비대 주동인은 손상이 아니라 기계적 장력</p></div>
  <div class="p" style="border-left:3px solid var(--rom)"><h3 style="color:var(--rom)">가동범위 — 늘어난 길이 부하</h3><p>전체적으론 풀 ROM이 약간 유리(차이 사소~작음, Wolf 2023)하지만, <span class="k">긴 근육 길이의 부분반복은 풀 ROM과 최소한 동등하거나 약간의 비대 이점</span>(Wolf 2023·2024/25). 삼두는 오버헤드(장두 신장)가 중립보다 비대 큼. 늘어난 위치 부하가 핵심.</p></div>
  <div class="p" style="border-left:3px solid var(--rom)"><h3 style="color:var(--rom)">길항근 훈련 → 유연성</h3><p><span class="k">상호억제(신경·즉각):</span> 길항근 수축 → 타이트한 주동근 반사적 이완(능동/PNF 스트레칭 원리). <span class="k">근력 훈련(구조·지속):</span> 풀 ROM 근력 훈련은 스트레칭과 비슷하게 ROM을 늘리고 근력까지 추가. 늘어난 길이의 편심성은 근섬유 길이(직렬 근절)를 늘려 능동 가동범위 확장(NHE 9주: 근섬유 +19~33%) — 단 늘어난 길이일 때만, 가역적.</p>
    <p class="src">참고: Wolf et al.(2023, ROM 메타); 늘어난 구간 부분반복(Wolf 2024/25, Pedrosa 2022); 근력 vs 스트레칭 ROM(Afonso 2021 메타·RCT 2024); 편심성 근섬유 길이(Franchi·NHE 연구). e1RM은 고반복에서 부정확해 12회로 캡한 추정치. 일반 가이드이며 개인 상태에 맞춰 조정.</p></div>`;}

const TABS=[['push','Push'],['pull','Pull'],['legs','Legs'],['history','기록'],['principles','원칙'],['behavior','행동·회복'],['evidence','근거']];
function build(){
  $('#tabs').innerHTML = TABS.map(([k,l])=>`<button class="tab" data-go="${k}">${l}</button>`).join('');
  $('#tabs').addEventListener('click',e=>{ const b=e.target.closest('[data-go]'); if(b) go(b.dataset.go); });
  $('#weekSeg').addEventListener('click',e=>{ const b=e.target.closest('[data-week]'); if(b){ week=b.dataset.week; localStorage.setItem(lk('week'),week); render(); }});
  $('#lvlSeg').addEventListener('click',e=>{ const b=e.target.closest('[data-lvl]'); if(b){ level=b.dataset.lvl; localStorage.setItem(lk('level'),level); render(); }});
  // 날짜 네비
  $('#dPrev').addEventListener('click',()=>{ date=shiftDate(date,-1); setDateInput(); if(isDay()) loadDay(); else render(); });
  $('#dNext').addEventListener('click',()=>{ date=shiftDate(date, 1); setDateInput(); if(isDay()) loadDay(); else render(); });
  $('#dToday').addEventListener('click',()=>{ date=kstToday(); setDateInput(); if(isDay()) loadDay(); else render(); });
  $('#dInput').addEventListener('change',e=>{ if(e.target.value){ date=e.target.value; setDateInput(); if(isDay()) loadDay(); else render(); }});
  $('#logout').addEventListener('click', async ()=>{ await sb.auth.signOut(); sessIds={}; store={}; sessionMeta={}; bestMap={}; });
  setDateInput();
  // main 위임 핸들러
  const main=$('#main');
  main.addEventListener('input',e=>{
    const t=e.target;
    if(t.matches('.log input')){ const id=t.dataset.id, f=t.dataset.f; (store[id]=store[id]||{})[f]=t.value;
      if(f==='w'||f==='r'){ const card=t.closest('.ex'); const el=card&&card.querySelector('.e1rm b'); if(el){ const e1=e1rm(store[id].w,store[id].r); el.textContent=e1?e1+'kg':'—'; } }
      queueEntry(id);
    } else if(t.id==='memo'){ queueMeta({memo:t.value.slice(0,2000)},'memo'); }
  });
  main.addEventListener('change',e=>{
    const t=e.target;
    if(t.id==='sBw'){ queueMeta({bodyweight_kg:numOrNull(t.value)},'bw'); }
    else if(t.id==='sSleep'){ queueMeta({sleep_hours:numOrNull(t.value)},'sleep'); }
  });
  main.addEventListener('blur',e=>{ if(e.target.matches('.log input')) flushEntryNow(e.target.dataset.id); }, true);
  main.addEventListener('click',e=>{
    const c=e.target.closest('.cond [data-c]');
    if(c){ const v=parseInt(c.dataset.c,10); sessionMeta.condition = (sessionMeta.condition===v?null:v); queueMeta({condition:sessionMeta.condition},'cond'); render(); return; }
    const dl=e.target.closest('#sDeload');
    if(dl){ sessionMeta.is_deload=!sessionMeta.is_deload; queueMeta({is_deload:sessionMeta.is_deload},'deload'); render(); return; }
  });
  initTools();
}
function isDay(){ return active==='push'||active==='pull'||active==='legs'; }
function setDateInput(){ const i=$('#dInput'); if(i) i.value=date; const w=$('#dWeekday'); if(w) w.textContent=weekdayKr(date)+'요일'+(date===kstToday()?' · 오늘':''); }
function go(k){ active=k; if(isDay()){ dayType=k; setAccent(k); loadDay(); } else { setAccent('push'); render(); } window.scrollTo({top:0,behavior:'smooth'}); }
function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.go===active));
  document.querySelectorAll('#weekSeg button').forEach(b=>b.classList.toggle('on',b.dataset.week===week));
  document.querySelectorAll('#lvlSeg button').forEach(b=>b.classList.toggle('on',b.dataset.lvl===level));
  $('#datebar').style.display = isDay() ? 'flex' : 'none';
  if(active==='history'){ renderHistory(); return; }
  const body = active==='principles'?renderPrinciples() : active==='behavior'?renderBehavior() : active==='evidence'?renderEvidence() : renderDay(active);
  $('#main').innerHTML = `<section class="view">${body}</section>`;
}

/* ---------- 휴식 타이머 (벽시계 기반) ---------- */
let tDur=90, tLeft=90, tRun=false, tInt=null, tEnd=0, setCount=0, ac=null;
function fmt(s){ const m=Math.floor(s/60), x=s%60; return m+':'+String(x).padStart(2,'0'); }
function tRender(){ const el=$('#fpTime'); if(!el) return; el.textContent=fmt(Math.max(0,tLeft)); el.classList.toggle('done', tLeft<=0 && tRun===false && tDur>0 && tEndedOnce); }
let tEndedOnce=false;
function beep(){ try{ ac=ac||new (window.AudioContext||window.webkitAudioContext)(); const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.frequency.value=880; g.gain.value=0.001; o.start(); g.gain.exponentialRampToValueAtTime(0.3, ac.currentTime+0.02); g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.5); o.stop(ac.currentTime+0.52); }catch(e){} }
function tStop(){ tRun=false; clearInterval(tInt); tInt=null; const b=$('#fpToggle'); if(b) b.textContent='시작'; }
function tSet(s){ tStop(); tDur=s; tLeft=s; tEndedOnce=false; tRender(); }
function tTick(){ tLeft=Math.max(0, Math.round((tEnd-Date.now())/1000)); tRender(); if(tLeft<=0){ tStop(); tEndedOnce=true; tRender(); beep(); if(navigator.vibrate) navigator.vibrate([200,100,200]); } }
function tToggle(){ if(tRun){ tStop(); } else { if(tLeft<=0) tLeft=tDur; tEnd=Date.now()+tLeft*1000; tRun=true; tEndedOnce=false; $('#fpToggle').textContent='일시정지'; clearInterval(tInt); tInt=setInterval(tTick,250); tRender(); } }
function tAdj(d){ tDur=Math.max(0,tDur+d); tLeft=Math.max(0,tLeft+d); if(tRun) tEnd=Date.now()+tLeft*1000; tRender(); }
function setRender(){ const el=$('#setN'); if(el) el.textContent=setCount; }
function initTools(){
  $('#fab').addEventListener('click',()=>$('#fpanel').classList.toggle('open'));
  document.querySelectorAll('#fpanel [data-set]').forEach(b=>b.addEventListener('click',()=>tSet(parseInt(b.dataset.set,10))));
  document.querySelectorAll('#fpanel [data-adj]').forEach(b=>b.addEventListener('click',()=>tAdj(parseInt(b.dataset.adj,10))));
  $('#fpToggle').addEventListener('click',tToggle);
  $('#fpReset').addEventListener('click',()=>tSet(tDur));
  $('#setMinus').addEventListener('click',()=>{ setCount=Math.max(0,setCount-1); setRender(); });
  $('#setPlus').addEventListener('click',()=>{ setCount++; setRender(); });
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden && tRun) tTick(); });
  tRender(); setRender();
}

boot();
</script>
</body>
